services:
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    ports:
      - "5210:80"
    depends_on:
      - backend
    networks:
      - nva-net

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    ports:
      - "8100:8000"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app
      - AMADEUS_MCP_URL=http://amadeus-mcp:8101
      - CAR_RENTAL_MCP_URL=http://car-rental-mcp:8102
      - HOTEL_BOOKING_MCP_URL=http://hotel-booking-mcp:8103
    volumes:
      - ../../config:/app/config
      - ../../data:/app/data:ro
    networks:
      - nva-net

  amadeus-mcp:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.amadeus-mcp
    ports:
      - "8101:8101"
    env_file:
      - ../../.env
    volumes:
      - ../../data:/app/data:ro
    networks:
      - nva-net

  car-rental-mcp:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.car-rental-mcp
    ports:
      - "8102:8102"
    networks:
      - nva-net

  hotel-booking-mcp:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.hotel-booking-mcp
    ports:
      - "8103:8103"
    networks:
      - nva-net

  frontend-spectrum:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend-spectrum
    ports:
      - "5211:80"
    depends_on:
      - backend
    networks:
      - nva-net

  frontend-angular:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend-angular
    ports:
      - "4210:80"
    depends_on:
      - backend
    networks:
      - nva-net

  nginx:
    image: nginx:alpine
    ports:
      - "3010:80"
    volumes:
      - ../nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - frontend-spectrum
      - frontend-angular
      - backend
    networks:
      - nva-net

networks:
  nva-net:
    driver: bridge

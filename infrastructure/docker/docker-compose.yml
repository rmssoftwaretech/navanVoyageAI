services:
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    ports:
      - "5210:80"
    depends_on:
      - backend
    networks:
      - nva-net

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    ports:
      - "8100:8000"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app
      - AMADEUS_MCP_URL=http://amadeus-mcp:8101
    networks:
      - nva-net

  amadeus-mcp:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.amadeus-mcp
    ports:
      - "8101:8101"
    env_file:
      - ../../.env
    networks:
      - nva-net

  frontend-spectrum:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend-spectrum
    ports:
      - "5211:80"
    depends_on:
      - backend
    networks:
      - nva-net

  frontend-angular:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend-angular
    ports:
      - "4210:80"
    depends_on:
      - backend
    networks:
      - nva-net

  nginx:
    image: nginx:alpine
    ports:
      - "3010:80"
    volumes:
      - ../nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - frontend-spectrum
      - frontend-angular
      - backend
    networks:
      - nva-net

networks:
  nva-net:
    driver: bridge

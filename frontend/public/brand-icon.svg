<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 100">
  <!-- Oval speed lines (gray, left side) -->
  <g fill="#8C9CAB">
    <rect x="20" y="12" width="34" height="4" rx="2"/>
    <rect x="10" y="20" width="46" height="4" rx="2"/>
    <rect x="4"  y="28" width="54" height="4" rx="2"/>
    <rect x="2"  y="36" width="57" height="4" rx="2"/>
    <rect x="2"  y="44" width="57" height="4" rx="2"/>
    <rect x="4"  y="52" width="54" height="4" rx="2"/>
    <rect x="10" y="60" width="46" height="4" rx="2"/>
    <rect x="20" y="68" width="34" height="4" rx="2"/>
  </g>

  <!-- Two streak/horn lines extending upper-right -->
  <path stroke="#8B1A3C" stroke-width="5.5" stroke-linecap="round" fill="none"
    d="M 86 27 Q 108 17, 138 8"/>
  <path stroke="#8B1A3C" stroke-width="3.5" stroke-linecap="round" fill="none"
    d="M 88 22 Q 112 12, 144 4"/>

  <!-- Main oryx/bird body -->
  <path fill="#8B1A3C" d="
    M 44 66
    C 40 59, 39 50, 42 42
    C 46 33, 56 27, 68 24
    C 79 21, 90 24, 98 31
    C 104 37, 106 47, 104 58
    L 102 66
    C 88 78, 70 78, 54 75
    C 47 74, 44 71, 44 66
    Z
  "/>

  <!-- Fan fingers (spread right from body) -->
  <!-- Finger 1: upper -->
  <polygon fill="#8B1A3C" points="101,53 138,41 106,64"/>
  <!-- Finger 2 -->
  <polygon fill="#8B1A3C" points="103,61 134,57 106,70"/>
  <!-- Finger 3 -->
  <polygon fill="#8B1A3C" points="103,68 124,70 104,77"/>
  <!-- Finger 4 -->
  <polygon fill="#8B1A3C" points="100,74 114,79 98,83"/>
  <!-- Finger 5: lower -->
  <polygon fill="#8B1A3C" points="94,80 104,86 90,88"/>

  <!-- White chest flame (decorative) -->
  <path fill="white" opacity="0.88" d="
    M 67 44
    L 64 37
    C 64 34, 67 33, 69 36
    C 70 38, 69 41, 70 44
    C 72 40, 74 37, 73 34
    C 75 38, 74 44, 71 48
    C 69 50, 67 50, 67 44
    Z
  "/>
</svg>
